// Touch port config — written for Ubuntu Touch ARM64
sensitivity 3.5
m_pitch 0.022
m_yaw 0.022
vid_fullscreen 1
vid_width 1080
vid_height 2160
joy_enable 1
cl_movement 1
cl_movement_maxspeed 320
cl_movement_jumpvelocity 270
cl_curl_enabled 0
r_shadow_realtime_world 0
r_shadow_realtime_dlight 0
r_bloom 0
r_motionblur 0
gl_texturecompression 1
r_picmipworld 1
r_picmipsprites 1
r_drawviewmodel 1
scr_sshot_jpeg 0
con_closeontoggle 1

// ── Virtual uinput gamepad (Xonotic Touch Gamepad) ──────────────────────────
// ABS_X (axis 0) → left stick horizontal → strafe
joy_axis0_type 2
joy_axis0_deadzone 0.15
joy_axis0_scale 200
// ABS_Y (axis 1) → left stick vertical   → forward / back
joy_axis1_type 1
joy_axis1_deadzone 0.15
joy_axis1_scale 200
// REL_X / REL_Y → camera look (mapped as mouse by darkplaces automatically)
// BTN_SOUTH (joy button 0) → primary attack
bind joy0 +attack
